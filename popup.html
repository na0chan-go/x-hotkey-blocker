<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X Hotkey Blocker</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 280px;
        background: #f6f7f9;
        color: #111827;
      }
      .wrap {
        padding: 14px;
      }
      .title {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 700;
      }
      .stack {
        display: grid;
        gap: 8px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px;
        border-radius: 10px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
      }
      .label {
        font-size: 13px;
        font-weight: 600;
      }
      .hint {
        margin: 10px 0 0;
        font-size: 12px;
        color: #4b5563;
        line-height: 1.4;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: #374151;
        line-height: 1.4;
      }
      input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 class="title">X Hotkey Blocker</h1>
      <div class="stack">
        <div class="row">
          <span class="label">機能を有効化</span>
          <input id="enabled-toggle" type="checkbox" />
        </div>
        <div class="row">
          <span class="label">二段階確認を使う</span>
          <input id="confirm-toggle" type="checkbox" />
        </div>
      </div>
      <p class="status" id="status-text">状態を確認中...</p>
      <p class="hint">確認ON: 3秒以内の再クリックで実行 / 確認OFF: 1回で実行</p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
